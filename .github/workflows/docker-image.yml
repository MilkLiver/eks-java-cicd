name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  #  schedule:
  #    - cron: '30 8 * * *'
  push:
    branches: ["*"]
    # Publish semver tags as releases.
    tags: ["*.*.*"]
  pull_request:
    branches: ["*"]

env:
  # Use docker.io for Docker Hub if empty
  PULL_IMAGE_REGISTRY: docker.io
  PUSH_IMAGE_REGISTRY: docker.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: milkliver/eks-java-cicd

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      #- name: Install cosign
      #  if: github.event_name != 'pull_request'
      #  uses: sigstore/cosign-installer@f3c664df7af409cb4873aa5068053ba9d61a57b6 #v2.6.0
      #  with:
      #    cosign-release: 'v1.11.0'

      # Workaround: https://github.com/docker/build-push-action/issues/461
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.PULL_IMAGE_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.PULL_IMAGE_REGISTRY }}
          username: ${{ secrets.PULL_IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.PULL_IMAGE_REGISTRY_PASSWORD }}

      - name: Log into registry ${{ env.PUSH_IMAGE_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.PUSH_IMAGE_REGISTRY }}
          username: ${{ secrets.PUSH_IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.PUSH_IMAGE_REGISTRY_PASSWORD }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PUSH_IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=branch
            type=schedule
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          context: ./
          build-args: |
            PROPERTIES=${{ vars.PROPERTIES }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
  tag-release:
      if: startsWith(github.ref, 'refs/tags/')
      needs: build-image
      runs-on: [aws, eks] # 這裡指定你的 EKS Bastion Runner
      env:
        IMAGE_TAG: ${{ github.ref_name }}
      steps:
        - uses: actions/checkout@v4
        - name: Run Special Task
          run: |
            helm -n eks-java-demo upgrade --install --wait --timeout 300s java-demo \
            -f ./helmchart/values.yaml \
            --server-side=auto \
            --set image.tag=${IMAGE_TAG} \
            ./helmchart/
            # 執行你指定的指令，例如部署到 EKS
      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      #- name: Sign the published Docker image
      #  if: ${{ github.event_name != 'pull_request' }}
      #  env:
      #    COSIGN_EXPERIMENTAL: "true"
      #  # This step uses the identity token to provision an ephemeral certificate
      #  # against the sigstore community Fulcio instance.
      #  run: echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign {}@${{ steps.build-and-push.outputs.digest }}
